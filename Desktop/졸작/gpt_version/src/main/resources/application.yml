server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

verivid:
  storage-root: ${VERIVID_STORAGE_ROOT:storage}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/responses}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.4-mini}
    image-detail: ${OPENAI_IMAGE_DETAIL:high}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:120}
  analysis:
    default-frame-count: ${VERIVID_DEFAULT_FRAME_COUNT:6}
    max-frame-count: ${VERIVID_MAX_FRAME_COUNT:8}
    neighbor-gap-millis: ${VERIVID_NEIGHBOR_GAP_MS:350}
    max-side-px: ${VERIVID_MAX_SIDE_PX:1280}
    jpeg-quality: ${VERIVID_JPEG_QUALITY:0.90}
